<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Wellness Journal">
<title>Wellness Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
 --sage:#8aab8a;--sage-light:#e8f0e8;--sage-mid:#c4d9c4;--input-bg:#f0f6f0;--input-border:#a8c8a8;
 --mint:#3dab8a;--mint-light:#d4f0e8;
 --sky:#7ab8d4;--sky-light:#daeef8;
 --cream:#fafcf9;--white:#ffffff;
 --text:#2d3d2d;--text-muted:#7a9478;--text-light:#aac4aa;
 --card-shadow:0 2px 16px rgba(61,171,138,0.08);
 --card-shadow-hover:0 6px 24px rgba(61,171,138,0.15);
 --radius:22px;--radius-sm:14px;--radius-xs:10px;
 --tab-h:72px;
 --safe-top:env(safe-area-inset-top,0px);
 --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-dark="true"]{
 --sage:#6b7b6b;--sage-light:#2e2e2e;--sage-mid:#505050;--input-bg:#363636;--input-border:#606060;
 --mint:#3dab8a;--mint-light:#1e3330;
 --sky:#5a9ab4;--sky-light:#1e2a33;
 --cream:#1a1a1a;--white:#272727;
 --text:#f0f0f0;--text-muted:#b8b8b8;--text-light:#787878;
 --card-shadow:0 2px 16px rgba(0,0,0,0.35);
 --card-shadow-hover:0 6px 24px rgba(0,0,0,0.45);
}
html,body{height:100%;overflow:hidden;background:var(--cream);font-family:'Inter',sans-serif;color:var(--text);transition:background 0.3s,color 0.3s;touch-action:manipulation;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;background:var(--cream);}
/* HEADER */
#header{padding:calc(var(--safe-top) + 16px) 20px 12px;background:var(--cream);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#header-title{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.5px;line-height:1;}
#header-title .header-gradient{background:linear-gradient(135deg,#3dab8a 0%,#7ab8d4 40%,#a78bfa 75%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-tagline{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}
.header-btns{display:flex;gap:8px;align-items:center;}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--white);box-shadow:var(--card-shadow);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:transform 0.15s;}
.icon-btn:active{transform:scale(0.92);}
/* SCROLL AREA */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 16px calc(var(--tab-h) + var(--safe-bottom) + 8px);background:var(--cream);}
#meals-content,#habits-content,#walk-content,#grocery-content,#analytics-content{display:flex;flex-direction:column;gap:18px;padding-bottom:16px;}
#meals-content>.card,#habits-content>.card,#walk-content>.card,#grocery-content>.card,#analytics-content>.card,#meals-content>.day-nav{margin-bottom:0;}
/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--tab-h) + var(--safe-bottom));background:var(--white);border-top:1px solid var(--sage-mid);display:flex;z-index:100;padding-bottom:var(--safe-bottom);box-shadow:0 -4px 20px rgba(61,171,138,0.08);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:6px 4px;transition:color 0.2s;border-radius:14px;}
.nav-btn .nav-icon{width:22px;height:22px;stroke:var(--text-muted);transition:transform 0.2s,stroke 0.2s;}
.nav-btn .nav-label{font-size:10px;font-weight:600;letter-spacing:0.3px;color:var(--text-muted);transition:color 0.2s;}
.nav-btn.active{background:var(--mint-light);}
.nav-btn.active .nav-icon{transform:scale(1.15);stroke:var(--mint);}
.nav-btn.active .nav-label{color:var(--mint);}
/* CARDS */
.card{background:var(--white);border-radius:var(--radius);border:1px solid rgba(138,171,138,0.18);box-shadow:0 8px 20px rgba(0,0,0,0.08);margin-bottom:18px;transition:box-shadow 0.2s,transform 0.2s;overflow:hidden;}
.card-header{padding:18px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;min-height:72px;}
.card-title{font-family:'Outfit',sans-serif;font-size:19px;color:var(--text);}
.card-body{padding:0 18px 18px;box-sizing:border-box;}
.card-body input,.card-body textarea{box-sizing:border-box;width:100%;max-width:100%;display:block;}
.time-input-wrap{display:inline-block;max-width:160px;width:48%;}
.time-input{width:100%;box-sizing:border-box;padding:12px 14px;border-radius:12px;border:2px solid var(--input-border);background:var(--input-bg);font-size:16px;color:var(--text);outline:none;font-family:Inter,sans-serif;-webkit-appearance:none;min-height:48px;height:48px;}
.chevron{font-size:12px;color:var(--text-muted);transition:transform 0.25s;display:inline-block;}
.chevron::after{content:"\25BE";font-size:14px;}
.chevron.open{transform:rotate(180deg);}
.collapsible{overflow:hidden;transition:max-height 0.3s ease,opacity 0.3s ease;max-height:0;opacity:0;}
.collapsible.open{max-height:2000px;opacity:1;}
/* PILL TAGS */
.pill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;}
.pill-mint{background:var(--mint-light);color:var(--mint);}
.pill-sky{background:var(--sky-light);color:var(--sky);}
.pill-sage{background:var(--sage-light);color:var(--sage);}
/* DAY NAVIGATOR */
.day-nav{display:flex;align-items:center;justify-content:space-between;background:var(--white);border-radius:var(--radius);box-shadow:0 10px 28px rgba(0,0,0,0.16);padding:16px 20px;margin-bottom:20px;}
.day-nav-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--sage-light);color:var(--mint);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:background 0.15s,transform 0.15s;}
.day-nav-btn:active{transform:scale(0.9);}
.day-nav-btn:disabled{opacity:0.3;cursor:default;}
.day-nav-center{text-align:center;}
.day-nav-date{font-family:'Outfit',sans-serif;font-size:17px;color:var(--text);}
.day-nav-day{font-size:11px;color:var(--text-muted);font-weight:500;margin-top:1px;}
/* SCHEDULE CHECKLIST */
.sched-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #e8f0e8;}
.sched-item:last-child{border-bottom:none;}
.sched-time{font-size:13px;color:var(--text-muted);font-weight:600;min-width:52px;}
.sched-check{width:22px;height:22px;border-radius:50%;border:2px solid #c4d9c4;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.2s,background 0.2s;}
.sched-check.done{background:var(--mint);border-color:var(--mint);}
.sched-check.done::after{content:'';color:white;font-size:11px;font-weight:700;}
.sched-label{font-size:15px;color:var(--text);flex:1;}
.sched-label.done{text-decoration:line-through;color:var(--text-muted);}
/* MEAL CARDS */
.meal-type{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;}
.meal-name{font-family:'Outfit',sans-serif;font-size:19px;color:var(--text);margin-bottom:6px;}
.meal-desc{font-size:16px;color:var(--text);line-height:1.6;}
.recipe-section{margin-top:12px;padding-top:12px;border-top:1px solid #e8f0e8;}
.recipe-label{font-size:12px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--mint);margin-bottom:10px;}
.recipe-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.recipe-item{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:3px 0;}
.recipe-item-check{width:22px;height:22px;border-radius:6px;border:2px solid #c4d9c4;background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;margin-top:1px;}
.recipe-item-check.done{background:var(--mint);border-color:var(--mint);}
.recipe-item-check.done::after{content:'\2713';font-size:11px;font-weight:700;color:white;}
.recipe-item-text{font-size:16px;color:var(--text);line-height:1.5;flex:1;font-weight:500;}
.recipe-item-text.done{text-decoration:line-through;color:var(--text-light);}
.recipe-steps{display:flex;flex-direction:column;gap:10px;margin-top:8px;}
.recipe-step{display:flex;gap:10px;cursor:pointer;align-items:flex-start;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--mint-light);color:var(--mint);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.15s;}
.step-num.done{background:var(--mint);color:white;}
.step-text{font-size:16px;color:var(--text);line-height:1.6;flex:1;font-weight:500;}
.step-text.done{text-decoration:line-through;color:var(--text-light);}
.timer-btn{display:inline-flex;align-items:center;gap:4px;background:var(--sky-light);color:var(--sky);border:none;border-radius:12px;padding:2px 8px;font-size:12px;font-weight:600;cursor:pointer;margin-left:4px;vertical-align:middle;}
.notes-input{width:100%;box-sizing:border-box;border:2px solid var(--sage-mid);border-radius:var(--radius-xs);padding:14px 16px;font-family:'Inter',sans-serif;font-size:17px;color:var(--text);background:var(--input-bg);resize:vertical;min-height:88px;margin-top:10px;outline:none;transition:border-color 0.2s,background 0.2s;-webkit-text-size-adjust:100%;touch-action:manipulation;}
.notes-input:focus{border-color:var(--mint);background:var(--input-bg);}
.notes-input::placeholder{color:var(--text-muted);}
.meal-meta-box{margin-top:10px;padding:0;background:transparent;border-radius:12px;border:1px solid rgba(138,171,138,0.16);overflow:hidden;}
.meal-meta-label{font-size:11px;font-weight:700;color:var(--mint);text-transform:uppercase;letter-spacing:0.5px;}
.meal-meta-text{font-size:14px;color:var(--text);line-height:1.45;padding:0 12px 10px;background:var(--sage-light);}
.meal-meta-toggle{padding:10px 12px !important;min-height:0 !important;background:var(--sage-light);}
.meal-notes-wrap{margin-top:14px;padding-top:12px;border-top:1px solid rgba(138,171,138,0.18);}
.meal-notes-label{font-size:11px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
/* TODDLER SNACK */
.toddler-card{background:var(--white);border-radius:var(--radius-sm);box-shadow:none;border:1.5px dashed var(--text-muted);margin-bottom:10px;}
.toddler-badge{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-light);background:var(--sage-light);padding:3px 10px;border-radius:10px;}
/* CHECKIN */
.checkin-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.energy-btn{padding:6px 14px;border-radius:20px;border:2px solid #c4d9c4;background:none;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.energy-btn.sel{background:var(--mint);border-color:var(--mint);color:white;}
.bloat-btn{padding:6px 14px;border-radius:20px;border:2px solid #c4d9c4;background:none;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.bloat-btn.sel{background:var(--sky);border-color:var(--sky);color:white;}
/* HABITS */
.habit-grid{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.habit-table{border-collapse:collapse;width:100%;table-layout:fixed;}
.habit-table colgroup col.habit-label-col{width:38%;}
.habit-table colgroup col.habit-day-col{width:9%;}
.habit-table th{font-size:10px;font-weight:700;letter-spacing:0.5px;color:var(--text-muted);padding:6px 2px;text-align:center;vertical-align:bottom;}
.habit-table td{padding:5px 2px;text-align:center;vertical-align:middle;}
.habit-name-cell{text-align:left !important;font-size:13px;font-weight:500;color:var(--text);padding-right:6px !important;word-break:break-word;}
.habit-dot{width:26px;height:26px;border-radius:50%;border:2px solid #c4d9c4;background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s;margin:0 auto;}
.habit-dot.done{background:var(--mint);border-color:var(--mint);}
.habit-dot.done::after{content:'\2713';color:white;font-size:11px;font-weight:700;}
.score-bar-wrap{margin-top:14px;}
.score-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.score-bar-label{font-size:11px;color:var(--text-muted);min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.score-bar-bg{flex:1;height:8px;border-radius:4px;background:var(--sage-light);overflow:hidden;}
.score-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3dab8a,#7ab8d4);transition:width 0.5s ease;}
.score-pct{font-size:11px;font-weight:700;color:var(--mint);min-width:28px;text-align:right;}
/* WALK */
.walk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.walk-day{aspect-ratio:1;border-radius:var(--radius-xs);display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--sage-light);cursor:pointer;transition:all 0.2s;border:2px solid transparent;}
.walk-day .wd-num{font-size:13px;font-weight:700;color:var(--text-muted);}
.walk-day .wd-label{font-size:9px;color:var(--text-light);}
.walk-day.done{background:var(--mint);border-color:var(--mint);}
.walk-day.done .wd-num{color:white;}
.walk-day.done .wd-label{color:rgba(255,255,255,0.8);}
.walk-day.today{background:rgba(61,171,138,0.14);}
.progress-bar{height:12px;border-radius:6px;background:var(--sage-light);overflow:hidden;margin:12px 0 6px;}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#3dab8a,#7ab8d4);transition:width 0.5s ease;}
/* GROCERY */
.grocery-week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.week-nav-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--sage-light);color:var(--mint);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all 0.15s;}
.week-nav-btn:active{transform:scale(0.9);}
.week-nav-btn:disabled{opacity:0.3;}
.week-nav-title{font-family:'Outfit',sans-serif;font-size:16px;color:var(--text);}
.grocery-section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mint);margin:12px 0 6px;}
.grocery-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #e8f0e8;cursor:pointer;transition:opacity 0.2s;}
.grocery-item.checked{opacity:0.4;}
.grocery-item.checked .gi-name{text-decoration:line-through;color:var(--text-muted);}
.gi-circle{width:22px;height:22px;border-radius:50%;border:2px solid #c4d9c4;background:none;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.grocery-item.checked .gi-circle{background:var(--mint);border-color:var(--mint);}
.grocery-item.checked .gi-circle::after{content:'';color:white;font-size:10px;font-weight:700;}
.gi-name{font-size:14px;color:var(--text);flex:1;}
.gi-qty{font-size:12px;color:var(--text-muted);font-weight:500;}
.copy-btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,#3dab8a,#7ab8d4);color:white;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px;letter-spacing:0.3px;transition:opacity 0.15s,transform 0.15s;}
.copy-btn:active{opacity:0.85;transform:scale(0.98);}
/* ANALYTICS */
.stat-card{background:var(--sage-light);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;}
.stat-card-title{font-size:12px;font-weight:700;letter-spacing:0.5px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
.stat-big{font-family:'Outfit',sans-serif;font-size:32px;color:var(--mint);}
.stat-label{font-size:12px;color:var(--text-muted);}
.weight-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--sage-mid);}
.weight-date{font-size:12px;color:var(--text-muted);min-width:60px;}
.weight-val{font-size:15px;font-weight:700;color:var(--text);}
.weight-delta{font-size:12px;font-weight:600;}
.weight-delta.pos{color:#e06060;}
.weight-delta.neg{color:var(--mint);}
.export-btn{width:100%;padding:14px;border-radius:var(--radius-sm);border:2px solid var(--mint);background:none;color:var(--mint);font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:all 0.15s;}
.export-btn:active{background:var(--mint);color:white;}
.tips-list{display:flex;flex-direction:column;gap:8px;}
.tip-item{padding:10px 12px;background:var(--mint-light);border-radius:var(--radius-xs);border-left:3px solid var(--mint);}
.tip-text{font-size:13px;color:var(--text);line-height:1.5;}
/* WEIGH IN */
.weigh-input-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
.weigh-input{flex:1;padding:10px 14px;border-radius:var(--radius-xs);border:2px solid #c4d9c4;background:var(--sage-light);font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--text);outline:none;transition:border-color 0.2s;}
.weigh-input:focus{border-color:var(--mint);}
.save-btn{padding:10px 18px;border-radius:var(--radius-xs);border:none;background:var(--mint);color:white;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.save-btn:active{opacity:0.8;}
/* WEEK SELECTOR */
.week-tab{display:flex;gap:6px;margin-bottom:14px;}
.week-tab-btn{flex:1;padding:9px;border-radius:var(--radius-xs);border:2px solid #c4d9c4;background:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.week-tab-btn.active{background:var(--mint);border-color:var(--mint);color:white;}
/* DIVIDER */
.divider{height:1px;background:#e8f0e8;margin:4px 0 12px;}
/* TOAST */
#toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--white);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* TABS */
.tab-content{display:none;}
.tab-content.active{display:block;}
/* SECTION spacing */
.section-gap{margin-top:6px;}
.full-divider{height:1px;background:var(--sage-mid);margin:16px 0;}
</style>
</head>
<body>
<div id="app">
 <div id="scroll">
 <div id="header">
 <div id="header-title"><div><span class="header-gradient">Wellness Journal</span></div><div class="header-tagline">Mar 19 – 31 · Cleveland</div></div>
 <div class="header-btns">
 <button class="icon-btn" onclick="exportAppData()" title="Export app data">⤴</button>
 <button class="icon-btn" onclick="importAppData()" title="Import app data">⤵</button>
 <button class="icon-btn" id="dark-toggle" title="Dark mode"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
 </div>
 </div>
 <!-- MEALS TAB -->
 <div id="tab-meals" class="tab-content active">
 <div id="meals-content"></div>
 </div>
 <!-- HABITS TAB -->
 <div id="tab-habits" class="tab-content">
 <div id="habits-content"></div>
 </div>
 <!-- WALK TAB -->
 <div id="tab-walk" class="tab-content">
 <div id="walk-content"></div>
 </div>
 <!-- GROCERY TAB -->
 <div id="tab-grocery" class="tab-content">
 <div id="grocery-content"></div>
 </div>
 <!-- ANALYTICS TAB -->
 <div id="tab-analytics" class="tab-content">
 <div id="analytics-content"></div>
 </div>
 </div>
 </div>

var state = {

function loadState() {
 try {
 var s = localStorage.getItem('wj_state_v2');
 if (s) {
 var parsed = JSON.parse(s);
 state.currentDay = parsed.currentDay || 0;
 state.currentGroceryWeek = parsed.currentGroceryWeek || 1;
 state.currentHabitsWeek = parsed.currentHabitsWeek || 1;
 state.darkMode = parsed.darkMode || false;
 }
 } catch(e) {}
}

function saveState() {
 try { localStorage.setItem('wj_state_v2', JSON.stringify(state)); } catch(e) {}
}

function loadData(key, def) {
 try {
 var v = localStorage.getItem('wj_' + key);
 return v ? JSON.parse(v) : def;
 } catch(e) { return def; }
}

function saveData(key, val) {
 try { localStorage.setItem('wj_' + key, JSON.stringify(val)); } catch(e) {}
}

function showToast(msg) {
 var t = document.getElementById('toast');
 t.textContent = msg;

 setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function toggleCollapsible(id) {
 var el = document.getElementById(id);
 var ch = document.getElementById(id + '_chevron');
 if (!el) return;
 el.classList.toggle('open');
 if (ch) ch.classList.toggle('open');
}

function openCollapsible(id) {
 var el = document.getElementById(id);
 var ch = document.getElementById(id + '_chevron');
 if (!el) return;
 el.classList.add('open');
 if (ch) ch.classList.add('open');
}

function getTodayET() {
 return new Intl.DateTimeFormat('en-CA', {timeZone:'America/New_York'}).format(new Date());
}

function getTimeStampET() {
 return new Intl.DateTimeFormat('en-US', {timeZone:'America/New_York', hour:'numeric', minute:'2-digit'}).format(new Date()).toLowerCase();
}

function getWeekDaysForCurrentGrocery() {
 return state.currentGroceryWeek === 1 ? DAYS.slice(0,6) : DAYS.slice(6,13);
}

function getMealExtras(meal, mealKey, dayIndex) {
 var extras = {prep:[], backup:[], glenn:''};
 var name = (meal && meal.name ? meal.name : '').toLowerCase();
 var desc = (meal && meal.desc ? meal.desc : '').toLowerCase();
 var saladish = name.indexOf('salad') >= 0 || desc.indexOf('salad') >= 0 || name.indexOf('caesar') >= 0;
 if (mealKey === 'breakfast') {
   extras.prep = ['Set out blender cup or saucepan tonight.', 'Wash fruit or portion oats so breakfast feels automatic.'];
   extras.backup = ['Smoothie with whatever fruit + oat milk you have.', 'Oatmeal with nut butter.', 'Toast or rice cakes with nut butter if you need ultra-easy.'];
 } else if (mealKey === 'lunch') {
   extras.prep = ['Chop one veggie or wash greens tonight.', 'Cook one base like pasta, rice, or couscous ahead if helpful.'];
   extras.backup = ['Pasta + olive oil + white beans.', 'Rice or couscous + chickpeas + lemon.', 'Smoothie and a simple snack plate if cooking feels like too much.'];
 } else {
   extras.prep = ['Chop garlic/veg or press tofu the night before.', 'Cook rice or couscous ahead when you know dinner energy will be low.'];
   extras.backup = ['Pasta + olive oil + beans.', 'Rice + chickpeas + olive oil.', 'Snack plate dinner or smoothie night totally counts.'];
 }
 if (saladish) {
   extras.prep = ['Make the dressing tonight.', 'Wash lettuce and chop crunchy toppings ahead.'];
   extras.backup = ['Warm couscous or rice bowl with the same toppings, no greens.', 'Chickpeas + olive oil + lemon bowl.', 'Pita + hummus if you have it.'];
   extras.glenn = 'Serve the same toppings as a wrap, pita plate, or grain bowl instead of over greens.';
 }
 if (name.indexOf('falafel') >= 0) {
   extras.prep = ['Chop cucumber, tomatoes, and onion ahead.', 'Stir together tahini-yogurt or lemon dressing tonight.'];
   extras.backup = ['Warm pita + hummus plate.', 'Rice bowl with chickpeas, cucumber, and lemon.', 'Couscous bowl with olives and tomatoes if falafel sounds like too much.'];
 }
 if (name.indexOf('pasta') >= 0 || name.indexOf('orzo') >= 0) {
   extras.backup = ['Pasta + olive oil + white beans.', 'Pasta + nutritional yeast + frozen peas.', 'Use any leftover pasta and call it done.'];
 }
 if (name.indexOf('tofu') >= 0 || name.indexOf('bowl') >= 0 || name.indexOf('rice') >= 0) {
   extras.backup = ['Rice + chickpeas + olive oil.', 'Rice + frozen veggies + nooch.', 'Smoothie + toast on a low-effort night.'];
 }
 return extras;
}

   var utcMs = now.getTime() + now.getTimezoneOffset()*60000;

   var etNow = new Date(utcMs + etOffset*3600000);
   var dayOfYear = Math.floor((etNow - new Date(etNow.getFullYear(),0,0)) / 86400000);
 var todayMove = DAILY_MOVES[dayOfYear % DAILY_MOVES.length];
 var moveChecked = loadData('move_check', {});
 var moveDone = moveChecked[todayKey] || false;

 });
 var text = lines.join('\n');

function exportForClaude() {
  var habits = loadData('habits', {});
  var weighin = loadData('weighin', {});
  var weighTs = loadData('weighin_ts', {});
  var walks = loadData('walks', {});
  var lines = [];

  var allDays = [];
  DAYS.forEach(function(d, i) {
    var ci = loadData('checkin_' + d.date, {energy:0,bloat:''});
    var sl = loadData('sleep_' + d.date, {wake:'',bed:'',sick:'',emilyWake:'',emilyBed:'',emilyNapStart:'',emilyNapEnd:'',emilySick:''});
    var ts = loadData('sched_ts_' + d.date, {});
    var bloatTs = loadData('bloat_ts_' + d.date, {time:'',val:''});
    var hd = habits[d.date] || {};
    var schedNote = loadData('sched_note_' + d.date, '');
    var mealNotes = loadData('notes_' + d.date, {});
    var eatingQ = loadData('eating_q_' + d.date, '');
    allDays.push({d:d, i:i, ci:ci, sl:sl, ts:ts, bloatTs:bloatTs, hd:hd, schedNote:schedNote, mealNotes:mealNotes, eatingQ:eatingQ});
  });

  lines.push('=== WELLNESS JOURNAL WEEKLY DEBRIEF ===');
  lines.push('Exported: ' + new Date().toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'}));
  lines.push('');
  lines.push('ABOUT ME');
  lines.push('Vegan mom, anemic. Iron 65mg at 9pm with OJ on empty stomach (2+ hrs after dinner). Magnesium 10pm.');
  lines.push('Mild food only. 2-year-old daughter Emily (vegan too) eats what I eat, plainer. No red sauce for Emily.');
  lines.push('Goals: weight loss + healthy habits. Supplement schedule is critical.');
  lines.push('');
  var gNote1 = loadData('grocery_note_1', '');
  var gNote2 = loadData('grocery_note_2', '');
  if (gNote1 || gNote2) {
    lines.push('GROCERY NOTES');
    if (gNote1) lines.push('Week 1: ' + gNote1);
    if (gNote2) lines.push('Week 2: ' + gNote2);
    lines.push('');
  }

  var sundays = DAYS.filter(function(d,i) { return isSunday(i); });
  var hasWeighIns = sundays.some(function(d) { return weighin[d.date]; });
  if (hasWeighIns) {
    lines.push('WEIGHT LOG');
    var prevW = null;
    sundays.forEach(function(d) {
      var wv = weighin[d.date];
      if (wv) {
        var wline = d.label + ': ' + wv + ' lbs';
        if (weighTs[d.date]) wline += ' (weighed at ' + weighTs[d.date] + ')';
        if (prevW !== null) {
          var delta = wv - prevW;
          wline += '  =>  ' + (delta >= 0 ? '+' : '') + delta.toFixed(1) + ' lbs';
        }
        lines.push(wline);
        prevW = wv;
      }
    });
    lines.push('');
  }

  lines.push('HABIT SUMMARY');
  var totalDays = 0; var totalSlots = 0; var doneSlots = 0;
  allDays.forEach(function(day) {
    var anyLogged = HABITS.some(function(h) { return day.hd[h.key] !== undefined; });
    if (anyLogged) { totalDays++; HABITS.forEach(function(h) { totalSlots++; if (day.hd[h.key]) doneSlots++; }); }
  });
  if (totalDays > 0) lines.push('Overall: ' + doneSlots + '/' + totalSlots + ' (' + Math.round(doneSlots/totalSlots*100) + '%) across ' + totalDays + ' days');
  HABITS.forEach(function(h) {
    var done = 0; var total = 0;
    allDays.forEach(function(day) {
      if (day.hd[h.key] !== undefined) { total++; if (day.hd[h.key]) done++; }
    });
    if (total > 0) {
      var pct = Math.round(done/total*100);
      var bar = '';
      for (var b = 0; b < 10; b++) { bar += (b < Math.round(pct/10)) ? '#' : '-'; }
      lines.push('  ' + h.label + ': ' + done + '/' + total + ' [' + bar + '] ' + pct + '%');
    }
  });
  lines.push('');

  var walkDone = Object.keys(walks).filter(function(k) { return walks[k]; }).length;
  var walkLog = loadData('walk_log', {});
  var walkLogEntries = Object.keys(walkLog).filter(function(k) { return walkLog[k]; });
  lines.push('WALK CHALLENGE: ' + walkDone + '/30 days (' + Math.round(walkDone/30*100) + '%)');
  if (walkLogEntries.length) {
    var totalMins = walkLogEntries.reduce(function(s,k) { return s + walkLog[k]; }, 0);
    lines.push('Actual walk times logged: ' + walkLogEntries.map(function(k) { return k.slice(5) + ': ' + walkLog[k] + 'min'; }).join(', '));
    lines.push('Total walking time logged: ' + totalMins + ' min');
  }
  lines.push('');

  lines.push('ENERGY ANALYSIS');
  var energyDays = allDays.filter(function(day) { return day.ci.energy; });
  if (!energyDays.length) {
    lines.push('No energy data yet.');
  } else {
    var avgE = energyDays.reduce(function(s,day) { return s + day.ci.energy; }, 0) / energyDays.length;
    lines.push('Average: ' + avgE.toFixed(1) + '/5 over ' + energyDays.length + ' days');
    var byLv = {1:[],2:[],3:[],4:[],5:[]};
    energyDays.forEach(function(day) { byLv[day.ci.energy].push(day.d.label.slice(5)); });
    for (var lv = 5; lv >= 1; lv--) { if (byLv[lv].length) lines.push('  Level ' + lv + ': ' + byLv[lv].join(', ')); }
    var lowE = energyDays.filter(function(day) { return day.ci.energy <= 2; });
    if (lowE.length) {
      lines.push('Low energy days with meal context:');
      lowE.forEach(function(day) {
        var meal = MEALS[day.i];
        lines.push('  ' + day.d.label + ' (energy ' + day.ci.energy + '): ' + meal.breakfast.name + ' / ' + meal.lunch.name + ' / ' + meal.dinner.name);
        if (day.ci.bloat) lines.push('    bloating: ' + day.ci.bloat);
        if (day.sl.wake || day.sl.bed) lines.push('    sleep: up ' + (day.sl.wake||'?') + ', bed ' + (day.sl.bed||'?'));
      });
    }
  }
  lines.push('');

  lines.push('BLOATING ANALYSIS');
  var bloatDays = allDays.filter(function(day) { return day.ci.bloat; });
  if (!bloatDays.length) {
    lines.push('No bloating data yet.');
  } else {
    var bc = {None:0,Mild:0,Bad:0};
    bloatDays.forEach(function(day) { if (bc[day.ci.bloat] !== undefined) bc[day.ci.bloat]++; });
    lines.push(bloatDays.length + ' days logged — None: ' + bc.None + ', Mild: ' + bc.Mild + ', Bad: ' + bc.Bad);
    var notableBloat = bloatDays.filter(function(day) { return day.ci.bloat === 'Mild' || day.ci.bloat === 'Bad'; });
    if (notableBloat.length) {
      lines.push('Bloating days detail:');
      notableBloat.forEach(function(day) {
        var meal = MEALS[day.i];
        var bl = '  ' + day.d.label + ' [' + day.ci.bloat + ']';
        if (day.bloatTs.time) bl += ' noticed at ' + day.bloatTs.time;
        lines.push(bl);
        lines.push('    Meals: ' + meal.breakfast.name + ' / ' + meal.lunch.name + ' / ' + meal.dinner.name);
        if (day.ci.energy) lines.push('    Energy: ' + day.ci.energy + '/5');
        ['breakfast','lunch','dinner'].forEach(function(mt) { if (day.mealNotes[mt]) lines.push('    ' + mt + ': ' + day.mealNotes[mt]); });
      });
    }
    lines.push('Please identify any meal or timing patterns that correlate with bloating.');
  }
  lines.push('');

  lines.push('MY SLEEP SUMMARY');
  var mySleepDays = allDays.filter(function(day) { return day.sl.wake || day.sl.bed; });
  if (!mySleepDays.length) {
    lines.push('No sleep data yet.');
  } else {
    mySleepDays.forEach(function(day) {
      var sl = '  ' + day.d.label + ':';
      if (day.sl.wake) sl += ' up ' + day.sl.wake;
      if (day.sl.bed) sl += ', bed ' + day.sl.bed;
      if (day.sl.sick === 'Yes') sl += ' [SICK]';
      if (day.ci.energy) sl += ' | energy ' + day.ci.energy + '/5';
      lines.push(sl);
    });
  }
  lines.push('');

  lines.push('EMILY SLEEP LOG & SCHEDULE ANALYSIS REQUEST');
  lines.push('Emily is 2 years old. Bedtime goal: 8pm. Nap limit: max 1.5 hours.');
  lines.push('Please analyze her schedule below and give concrete suggestions for hitting 8pm bedtime.');
  var emilyDays = allDays.filter(function(day) { return day.sl.emilyWake || day.sl.emilyBed || day.sl.emilyNapStart; });
  if (!emilyDays.length) {
    lines.push('No Emily sleep data logged yet.');
  } else {
    emilyDays.forEach(function(day) {
      var el = '  ' + day.d.label + ':';
      if (day.sl.emilyWake) el += ' wake ' + day.sl.emilyWake;
      if (day.sl.emilyBed) el += ', bed ' + day.sl.emilyBed;
      if (day.sl.emilyNapStart && day.sl.emilyNapEnd) {
        var sp = day.sl.emilyNapStart.split(':');
        var ep = day.sl.emilyNapEnd.split(':');
        var nm = (parseInt(ep[0])*60+parseInt(ep[1])) - (parseInt(sp[0])*60+parseInt(sp[1]));
        if (nm > 0) {
          el += ', nap ' + day.sl.emilyNapStart + '-' + day.sl.emilyNapEnd + ' (' + Math.floor(nm/60) + 'h' + (nm%60 ? nm%60+'m' : '') + ')';
          if (nm > 90) el += ' OVER LIMIT';
        }
      } else if (day.sl.emilyNapStart) {
        el += ', nap started ' + day.sl.emilyNapStart + ' (no end logged)';
      }
      if (day.sl.emilySick === 'Yes') el += ' [SICK]';
      lines.push(el);
    });
    lines.push('Questions: Is nap timing helping or hurting her bedtime? What nap window works best for a 2-year-old targeting 8pm bedtime? Any red flags this week?');
  }
  lines.push('');

  lines.push('FULL DAILY LOGS');
  allDays.forEach(function(day) {
    var meal = MEALS[day.i];
    var hasData = day.ci.energy || day.ci.bloat || day.sl.wake || day.sl.bed || day.schedNote ||
      Object.keys(day.ts).length || Object.keys(day.mealNotes).some(function(k) { return day.mealNotes[k]; });
    if (!hasData) return;
    lines.push('');
    lines.push(day.d.label.toUpperCase());
    lines.push('  Meals: ' + meal.breakfast.name + ' / ' + meal.lunch.name + ' / ' + meal.dinner.name);
    if (day.ci.energy) lines.push('  Energy: ' + day.ci.energy + '/5');
    if (day.ci.bloat) { var bl = '  Bloating: ' + day.ci.bloat; if (day.bloatTs.time) bl += ' at ' + day.bloatTs.time; lines.push(bl); }
    if (day.sl.sick === 'Yes') lines.push('  Sick: Yes');
    ['breakfast','lunch','dinner'].forEach(function(mt) { if (day.mealNotes[mt]) lines.push('  ' + mt + ' note: ' + day.mealNotes[mt]); });
    var ysn = loadData('your_snack_' + day.d.date, ['','']);
    if (ysn[0]) lines.push('  Morning snack: ' + ysn[0]);
    if (ysn[1]) lines.push('  Afternoon snack: ' + ysn[1]);
    var snackNotes = loadData('snack_notes_' + day.d.date, '');
    if (snackNotes) lines.push('  Snack notes: ' + snackNotes);
    var keyTs = ['iron','walk','breakfast','lunch','dinner'];
    var tsOut = keyTs.filter(function(k) { return day.ts[k]; }).map(function(k) { return k + '@' + day.ts[k]; });
    if (tsOut.length) lines.push('  Times: ' + tsOut.join(', '));
    if (day.schedNote) lines.push('  Schedule note: ' + day.schedNote);
  });

  lines.push('');
  // Eating quality summary
  var eqCounts = {Light:0, 'On Track':0, Indulgent:0, unlogged:0};
  allDays.forEach(function(day) {
    if (day.eatingQ) eqCounts[day.eatingQ] = (eqCounts[day.eatingQ]||0) + 1;
    else eqCounts.unlogged++;
  });
  var eqLogged = allDays.filter(function(day) { return day.eatingQ; });
  if (eqLogged.length) {
    lines.push('EATING QUALITY LOG');
    lines.push('Light: ' + (eqCounts.Light||0) + ' days | On Track: ' + (eqCounts['On Track']||0) + ' days | Indulgent: ' + (eqCounts.Indulgent||0) + ' days');
    eqLogged.forEach(function(day) {
      var meal = MEALS[day.i];
      lines.push('  ' + day.d.label.slice(5) + ' [' + day.eatingQ + ']: ' + meal.breakfast.name + ' / ' + meal.lunch.name + ' / ' + meal.dinner.name);
    });
    lines.push('');
  }

  lines.push('=== END OF EXPORT ===');
  lines.push('');
  lines.push('WEIGHT LOSS CONTEXT FOR CLAUDE:');
  lines.push('I am a vegan mom trying to lose weight steadily while building healthy habits.');
  lines.push('I am anemic — iron-rich plant foods (lentils, beans, spinach, tofu) are important.');
  lines.push('I eat mild food only (no spice/chili). I have a 2-year-old who eats with me.');
  lines.push('I take iron at 9pm — vitamin C (OJ) helps absorption, calcium and coffee hurt it.');
  lines.push('I am working toward a big breakfast habit to support metabolism and satiety.');
  lines.push('I skipped breakfast on Day 1 — this is something I want to avoid going forward.');
  lines.push('');
  lines.push('REQUESTS FOR CLAUDE:');
  lines.push('1. Habit insights — most/least consistent habits and why?');
  lines.push('2. Energy patterns — correlations with meals, sleep, iron timing, or bloating?');
  lines.push('3. Bloating triggers — which meals or ingredients might be causing it?');
  lines.push('4. My sleep quality — enough hours? Next-day energy correlation?');
  lines.push('5. Emily schedule — concrete nap/bedtime suggestions for 8pm goal.');
  lines.push('6. Weight loss — based on my meals this week, what is working and what is not?');
  lines.push('   Flag any meals that were high-calorie or low-protein for a vegan.');
  lines.push('   Suggest 2-3 specific meal swaps or additions for next week to support weight loss.');
  lines.push('   Note any iron-rich meal opportunities I missed.');
  lines.push('7. Eating quality — any patterns between Light/On Track/Indulgent days and energy or bloating?');
  lines.push('8. One specific focus for next week across all of the above.');

  var text = lines.join('\n');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast('Exported! Paste into Claude'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Exported! Paste into Claude');
  }
}

function exportAppData() {
  try {
    var payload = {};
    Object.keys(localStorage).forEach(function(k){
      if (k.indexOf('wj_') === 0 || k === 'wj_state_v2') payload[k] = localStorage.getItem(k);
    });
    var text = JSON.stringify(payload);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ showToast('App data copied'); });
    } else {
      window.prompt('Copy your app data:', text);
    }
  } catch (e) {
    showToast('Export failed');
  }
}

function importAppData() {
  var pasted = window.prompt('Paste exported app data JSON here');
  if (!pasted) return;
  try {
    var payload = JSON.parse(pasted);
    Object.keys(payload).forEach(function(k){ localStorage.setItem(k, payload[k]); });
    showToast('Imported! Reloading...');
    setTimeout(function(){ location.reload(); }, 400);
  } catch (e) {
    showToast('Import failed');
  }
}

 ['2026-03-19','2026-03-20','2026-03-21','2026-03-22','2026-03-23','2026-03-24'].forEach(function(d){

 });

 ['2026-03-20','2026-03-21','2026-03-24'].forEach(function(d){ setHabit(d,'big_bfast', true); });
 ['2026-03-20','2026-03-22','2026-03-23'].forEach(function(d){ setHabit(d,'sweet_treat', true); });
 ['2026-03-20','2026-03-23'].forEach(function(d){ setHabit(d,'alcohol_free', true); });
 if (changed) saveData('habits', habits);
 var checks = {

  '2026-03-21': {energy:3,bloat:'None'},

 };
 Object.keys(checks).forEach(function(date){ if (!localStorage.getItem('wj_checkin_' + date)) saveData('checkin_' + date, checks[date]); });
 var walkLog = loadData('walk_log', {});
 if (!walkLog['2026-03-19']) walkLog['2026-03-19'] = 44;

}
